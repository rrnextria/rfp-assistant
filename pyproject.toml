[tool.ruff]
target-version = "py312"
line-length = 100
select = ["E", "F", "I", "UP"]
exclude = [".venv", "how_to/.venv", "migrations", "frontend", "node_modules"]

[tool.black]
line-length = 100
target-version = ["py312"]
exclude = '''
/(
    \.venv
  | how_to/\.venv
  | migrations
  | frontend
  | node_modules
)/
'''

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["services"]
