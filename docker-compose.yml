services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: rfpassistant
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rfpassistant"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  migrate:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    command: >
      sh -c "pip install alembic psycopg[binary] --quiet &&
             alembic upgrade head"
    env_file: .env
    volumes:
      - ./migrations:/app/migrations
      - ./alembic.ini:/app/alembic.ini
      - ./common:/common
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    volumes:
      - ./services/api-gateway:/app
      - ./common:/common
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  orchestrator:
    build:
      context: .
      dockerfile: services/orchestrator/Dockerfile
    volumes:
      - ./services/orchestrator:/app
      - ./common:/common
    ports:
      - "8001:8001"
    env_file: .env
    environment:
      - RETRIEVAL_SERVICE_URL=http://retrieval-service:8002
      - AUDIT_SERVICE_URL=http://audit-service:8008
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  retrieval-service:
    build:
      context: .
      dockerfile: services/retrieval-service/Dockerfile
    volumes:
      - ./services/retrieval-service:/app
      - ./common:/common
    ports:
      - "8002:8002"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  content-service:
    build:
      context: .
      dockerfile: services/content-service/Dockerfile
    volumes:
      - ./services/content-service:/app
      - ./common:/common
    ports:
      - "8003:8003"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  rbac-service:
    build:
      context: .
      dockerfile: services/rbac-service/Dockerfile
    volumes:
      - ./services/rbac-service:/app
      - ./common:/common
    ports:
      - "8004:8004"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  rfp-service:
    build:
      context: .
      dockerfile: services/rfp-service/Dockerfile
    volumes:
      - ./services/rfp-service:/app
      - ./common:/common
    ports:
      - "8005:8005"
    env_file: .env
    environment:
      - ORCHESTRATOR_URL=http://orchestrator:8001
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  model-router:
    build:
      context: .
      dockerfile: services/model-router/Dockerfile
    volumes:
      - ./services/model-router:/app
      - ./common:/common
    ports:
      - "8006:8006"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  adapters:
    build:
      context: .
      dockerfile: services/adapters/Dockerfile
    volumes:
      - ./services/adapters:/app
      - ./common:/common
    ports:
      - "8007:8007"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy

  audit-service:
    build:
      context: .
      dockerfile: services/audit-service/Dockerfile
    volumes:
      - ./services/audit-service:/app
      - ./common:/common
    ports:
      - "8008:8008"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  analytics-service:
    build:
      context: .
      dockerfile: services/analytics-service/Dockerfile
    volumes:
      - ./services/analytics-service:/app
      - ./common:/common
    ports:
      - "8009:8009"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  portfolio-service:
    build:
      context: .
      dockerfile: services/portfolio-service/Dockerfile
    volumes:
      - ./services/portfolio-service:/app
      - ./common:/common
    ports:
      - "8010:8010"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NODE_ENV=production
    depends_on:
      - api-gateway

volumes:
  postgres_data:
